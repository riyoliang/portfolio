<style>
:root {
  --af-primary: #4a6fa5; --af-bg: #fafafa; --af-accent: #d4e4f7;
  --af-sub: #c0c0c0; --af-text: #1a1a2e; --af-white: #ffffff;
  --af-emphasis: #eef3fa;
  --af-shadow: 0 2px 8px rgba(74,111,165,0.12); --af-radius: 6px;
  --af-font: 'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--af-font); background:#f0f4f9; color:var(--af-text); }
.header {
  background:var(--af-primary); color:var(--af-white);
  padding:16px 32px; display:flex; align-items:center;
  justify-content:space-between; box-shadow:0 2px 12px rgba(74,111,165,.3);
}
.header h1 { font-size:1.2rem; font-weight:700; letter-spacing:.04em; }
.header .sub { font-size:.78rem; opacity:.8; margin-top:2px; }
.badge {
  background:rgba(255,255,255,.18); border-radius:var(--af-radius);
  padding:5px 14px; font-size:.82rem; font-weight:700;
}
.container { max-width:1280px; margin:0 auto; padding:20px 20px 48px; }
.kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:16px; }
.kpi { background:var(--af-white); border-radius:var(--af-radius); box-shadow:var(--af-shadow);
         padding:18px 22px; border-top:3px solid var(--af-primary); }
.kpi.rf  { border-top-color:#6a9fd8; }
.kpi.tot { border-top-color:#2d6a2d; }
.kpi-lbl { font-size:.74rem; color:#666; font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
.kpi-val-row { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
.kpi-val { font-size:1.55rem; font-weight:700; color:var(--af-primary); }
.kpi.rf  .kpi-val { color:#6a9fd8; }
.kpi.tot .kpi-val { color:#2d6a2d; }
.kpi-jpy { font-size:.74rem; color:#aaa; }
.kpi-sub { font-size:.74rem; color:#888; margin-top:3px; }
.kpi-chg { font-size:.76rem; font-weight:700; margin-top:2px; }
.up { color:#c0392b; } .dn { color:#2d9d2d; }
.charts-row { display:grid; grid-template-columns:1fr 320px; gap:14px; margin-bottom:16px; }
.card { background:var(--af-white); border-radius:var(--af-radius); box-shadow:var(--af-shadow); padding:18px 22px; }
.card-title { font-size:.84rem; font-weight:700; color:var(--af-primary);
               border-bottom:2px solid var(--af-accent); padding-bottom:8px; margin-bottom:14px; }
.cw { position:relative; height:230px; }
.cw-pie { position:relative; height:210px; }
table { border-collapse:collapse; width:100%; font-size:.82rem; }
thead tr { background:var(--af-primary); color:var(--af-white); font-weight:700; }
tbody tr:nth-child(odd)  { background:var(--af-bg); }
tbody tr:nth-child(even) { background:var(--af-accent); }
tbody tr.tot { background:var(--af-emphasis); font-weight:700; }
tbody tr:hover { background:#c5d8ef; transition:background .12s; }
th,td { padding:8px 11px; border:1px solid var(--af-sub); text-align:left; }
td.r { text-align:right; font-variant-numeric:tabular-nums; }
.lt { display:inline-block; background:var(--af-accent); color:var(--af-primary);
       border-radius:3px; padding:1px 5px; font-size:.72rem; font-weight:700; }
.panel { display:none; } .panel.on { display:block; }
.hist-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap;
             background:var(--af-emphasis); border-radius:var(--af-radius);
             padding:9px 13px; margin-bottom:12px; }
.hist-bar label { font-size:.76rem; font-weight:700; color:var(--af-primary); white-space:nowrap; }
.snap-sel { flex:1; min-width:180px; max-width:320px; padding:5px 8px;
             border:2px solid var(--af-primary); border-radius:var(--af-radius);
             font-family:var(--af-font); font-size:.82rem; color:var(--af-text);
             background:var(--af-white); cursor:pointer; }
.snap-sel:focus { outline:2px solid var(--af-primary); }
.nav-btn { background:var(--af-primary); color:#fff; border:none; border-radius:var(--af-radius);
            padding:5px 14px; font-size:.8rem; font-weight:700; cursor:pointer;
            font-family:var(--af-font); transition:opacity .15s; }
.nav-btn:hover { opacity:.82; } .nav-btn:disabled { opacity:.35; cursor:default; }
.hist-count { font-size:.72rem; color:#888; margin-left:auto; white-space:nowrap; }
.latest-badge { display:none; background:#f5c518; color:#1a1a2e; border-radius:var(--af-radius);
                 padding:3px 10px; font-size:.76rem; font-weight:700; white-space:nowrap; }
.latest-badge.on { display:inline-block; }
.rate { background:var(--af-accent); border-radius:var(--af-radius); padding:7px 14px;
         font-size:.76rem; color:#555; margin-bottom:10px; display:flex; gap:20px; flex-wrap:wrap; }
.rate span { font-weight:700; color:var(--af-primary); }
.sec { font-size:.84rem; font-weight:700; color:var(--af-primary);
        border-left:3px solid var(--af-primary); padding-left:9px; margin:16px 0 10px; }
.leg { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
.leg-i { display:flex; align-items:center; gap:4px; font-size:.72rem; }
.dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
@media(max-width:900px){ .charts-row{ grid-template-columns:1fr; } }
@media(max-width:640px){
  .header{ padding:12px 16px; flex-wrap:wrap; gap:8px; }
  .header h1{ font-size:1.05rem; }
  .badge{ font-size:.75rem; padding:4px 10px; }
  .kpi-row{ grid-template-columns:1fr 1fr; }
  .kpi.tot{ grid-column:1 / -1; }
  .kpi-val{ font-size:1.3rem; }
  .container{ padding:12px 12px 40px; }
  table{ font-size:.74rem; }
  th,td{ padding:6px 7px; }
}
</style>
</head>

const USD_JPY = 159.22;
const _comma = n => String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const fmt = n => '¥' + _comma(n);
const pct = v => (v*100).toFixed(2)+'%';
const shs = v => _comma(v);
const COLS = ['#4a6fa5','#e07b39','#2a9d8f','#c0392b','#7b5ea7','#e9c46a','#59a14f','#e76f51'];
// CNY → JPY（用各快照自身的 usd_cny + 生成时 USD/JPY）
const toJPY  = (cny, usd_cny) => Math.round(cny * USD_JPY / usd_cny);
const fmtJPY = n => '≈ ￥' + _comma(Math.round(n/10000)) + '万円';

const L = DATA[DATA.length-1], P = DATA[DATA.length-2];
document.getElementById('dateBadge').textContent = 'Snapshot · '+L.date;
document.getElementById('kR').textContent  = fmt(L.total_risky);
document.getElementById('kRp').textContent = '占总资产 '+pct(L.total_risky/L.total);
document.getElementById('kF').textContent  = fmt(L.total_rf);
document.getElementById('kFp').textContent = '占总资产 '+pct(L.total_rf/L.total);
document.getElementById('kT').textContent  = fmt(L.total);
document.getElementById('kRj').textContent = fmtJPY(toJPY(L.total_risky, L.usd_cny));
document.getElementById('kFj').textContent = fmtJPY(toJPY(L.total_rf,    L.usd_cny));
document.getElementById('kTj').textContent = fmtJPY(toJPY(L.total,       L.usd_cny));

function setChg(elId, cur, prev) {
  const d = cur - prev, el = document.getElementById(elId);
  el.textContent = `较上期 ${d>=0?'+':''}${fmt(d)} (${d>=0?'+':''}${pct(d/prev)})`;
  el.className = 'kpi-chg '+(d>=0?'up':'dn');  // 红涨绿跌（大陆习惯）
}
setChg('kRc', L.total_risky, P.total_risky);
setChg('kFc', L.total_rf,    P.total_rf);
setChg('kC',  L.total,       P.total);

new Chart(document.getElementById('trendC').getContext('2d'),{
  type:'line',
  data:{
    labels: DATA.map(s=>s.date.slice(5)),
    datasets:[
      {label:'总资产',   data:DATA.map(s=>s.total),       borderColor:'#4a6fa5',backgroundColor:'rgba(74,111,165,.09)',borderWidth:2.5,pointRadius:5,fill:true,tension:.3},
      {label:'风险资产', data:DATA.map(s=>s.total_risky), borderColor:'#6a9fd8',backgroundColor:'transparent',borderWidth:1.8,borderDash:[5,4],pointRadius:3,tension:.3},
      {label:'无风险',   data:DATA.map(s=>s.total_rf),    borderColor:'#2d6a2d',backgroundColor:'transparent',borderWidth:1.8,borderDash:[3,4],pointRadius:3,tension:.3}
    ]
  },
  options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{font:{family:"'Noto Sans JP'",size:11},boxWidth:13}},
              tooltip:{callbacks:{label:c=>' '+c.dataset.label+': ¥'+Math.round(c.raw).toLocaleString()}}},
    scales:{y:{ticks:{callback:v=>'¥'+(v/1e6).toFixed(1)+'M',font:{family:"'Noto Sans JP'",size:10}},grid:{color:'#e8eef6'}},
             x:{ticks:{font:{family:"'Noto Sans JP'",size:10}}}}
  }
});

new Chart(document.getElementById('pieC').getContext('2d'),{
  type:'doughnut',
  data:{labels:L.stocks.map(s=>s.name),datasets:[{data:L.stocks.map(s=>s.cny),backgroundColor:COLS,borderColor:'#fff',borderWidth:2,hoverOffset:5}]},
  options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},
              tooltip:{callbacks:{label:c=>' '+c.label+': ¥'+Math.round(c.raw).toLocaleString()+' ('+pct(c.raw/L.total_risky)+')'}}}
  }
});
const legEl = document.getElementById('leg');
L.stocks.forEach((s,i)=>{legEl.innerHTML+=`<div class="leg-i"><div class="dot" style="background:${COLS[i]}"></div><span>${s.name} ${pct(s.ratio)}</span></div>`});

// ── 持仓明细：构建面板 + 导航 ────────────────────────────
const pnlsEl = document.getElementById('panels');
// 1. 构建所有面板
DATA.forEach((snap, idx) => {
  const chg2 = idx > 0 ? snap.total - DATA[idx-1].total : null;
  const chgHtml = chg2 != null
    ? `<span style="color:${chg2>=0?'#c0392b':'#2d9d2d'};font-weight:700">${chg2>=0?'▲':'▼'} ¥${Math.abs(chg2).toLocaleString()} (${Math.abs(chg2/DATA[idx-1].total*100).toFixed(2)}%)</span>`
    : '<span style="color:#999">基准</span>';
  const pnl = document.createElement('div');
  pnl.className = 'panel'; pnl.id = 'p' + idx;
  let h = `<div class="rate"><div>日期：<span>${snap.date}</span></div><div>USD/CNY：<span>${snap.usd_cny}</span></div><div>HKD/CNY：<span>${snap.hkd_cny}</span></div><div>较上期：${chgHtml}</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div><div class="sec">风险资产</div>
  <table><thead><tr><th>企业</th><th class="r">持股数</th><th>股价</th><th class="r">人民币市值</th><th class="r">持仓比例</th><th class="r">老唐比例</th></tr></thead><tbody>`;
  snap.stocks.forEach(s => {
    const lt = s.laotang != null ? `<span class="lt">${pct(s.laotang)}</span>` : '—';
    h += `<tr><td>${s.name}</td><td class="r">${shs(s.shares)}</td><td>${s.price}</td><td class="r">${fmt(s.cny)}</td><td class="r">${pct(s.ratio)}</td><td class="r">${lt}</td></tr>`;
  });
  h += `<tr class="tot"><td colspan="3"><b>合计</b></td><td class="r"><b>${fmt(snap.total_risky)}</b><div style="font-size:.72rem;color:#888;font-weight:400">${fmtJPY(toJPY(snap.total_risky,snap.usd_cny))}</div></td><td colspan="2"></td></tr>
  </tbody></table></div>
  <div><div class="sec">无风险资产</div>
  <table><thead><tr><th>品种</th><th class="r">持股数</th><th>价格</th><th class="r">人民币市值</th><th class="r">占比</th></tr></thead><tbody>`;
  snap.rf.forEach(s => { h += `<tr><td>${s.name}</td><td class="r">${shs(s.shares)}</td><td>${s.price}</td><td class="r">${fmt(s.cny)}</td><td class="r">${pct(s.ratio)}</td></tr>`; });
  h += `<tr class="tot"><td colspan="3"><b>合计</b></td><td class="r"><b>${fmt(snap.total_rf)}</b><div style="font-size:.72rem;color:#888;font-weight:400">${fmtJPY(toJPY(snap.total_rf,snap.usd_cny))}</div></td><td></td></tr>
  </tbody></table>
  <div style="margin-top:14px;padding:11px 15px;background:var(--af-emphasis);border-radius:var(--af-radius);font-size:.85rem">
    <b style="color:var(--af-primary)">总资产：${fmt(snap.total)}</b>
    <span style="color:#888;font-size:.78rem;margin-left:6px">${fmtJPY(toJPY(snap.total,snap.usd_cny))}</span>
    &nbsp; 风险 ${pct(snap.total_risky/snap.total)} &nbsp; 无风险 ${pct(snap.total_rf/snap.total)}
  </div></div></div>`;
  pnl.innerHTML = h; pnlsEl.appendChild(pnl);
});

// 2. 核心切换函数
let curIdx = DATA.length - 1;
function switchTo(idx) {
  if (idx < 0 || idx >= DATA.length) return;
  curIdx = idx;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('p' + idx).classList.add('on');
  document.getElementById('snapSel').value = idx;
  document.getElementById('prevBtn').disabled = (idx === 0);
  document.getElementById('nextBtn').disabled = (idx === DATA.length - 1);
  document.getElementById('histCount').textContent = `第 ${idx+1} / ${DATA.length} 条`;
  document.getElementById('latestBadge').classList.toggle('on', idx === DATA.length - 1);
}

// 3. 下拉选择器（全量，按月分组）
const sel = document.getElementById('snapSel');
let lastMonth = '';
DATA.forEach((snap, idx) => {
  const mo = snap.date.slice(0, 7);
  if (mo !== lastMonth) {
    const og = document.createElement('optgroup');
    og.label = mo.replace('-', ' 年 ') + ' 月';
    sel.appendChild(og); lastMonth = mo;
  }
  const opt = document.createElement('option');
  opt.value = idx;
  opt.textContent = snap.date;
  sel.lastElementChild.appendChild(opt);
});
sel.addEventListener('change', e => switchTo(+e.target.value));

// 4. 箭头按钮
document.getElementById('prevBtn').onclick = () => switchTo(curIdx - 1);
document.getElementById('nextBtn').onclick = () => switchTo(curIdx + 1);

// 6. 初始显示最新
switchTo(DATA.length - 1);
</script>
</body>
</html>
